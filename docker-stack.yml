version: '3.8'

services:
  db:
    image: postgres:16
    secrets:
      - db-password
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
      - POSTGRES_DB=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    stop_grace_period: 60s
    deploy:
      update_config:
        # PostgreSQL is a single writer using one persistent local volume.
        # Never overlap old and new database tasks during an update.
        order: stop-first
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      resources:
        reservations:
          memory: 192M
        limits:
          memory: 384M
    networks:
      - uschedule-net

  backend:
    image: ghcr.io/arsen2019/uschedule:${GIT_COMMIT_HASH:-latest}
    environment:
      - TRACKER_ADMIN_TOKEN=${TRACKER_ADMIN_TOKEN}
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    stop_grace_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
        monitor: 45s
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 256M
    networks:
      - uschedule-net
      - traefik-net

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.schedule.arsgreg.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


networks:
  uschedule-net:
    external: true
  traefik-net:
    external: true

volumes:
  postgres-data:
secrets:
  db-password:
    external: true

